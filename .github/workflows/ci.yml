name: CI

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build_test:
    uses: membraneframework/membrane_actions/.github/workflows/build-test.yml@main

  lint:
    uses: membraneframework/membrane_actions/.github/workflows/lint.yml@main

  test:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test
    container:
      image: membraneframeworklabs/docker_membrane:latest
      env:
        ASDF_DATA_DIR: /root/.asdf
    steps:
      - uses: actions/checkout@v4
      - name: Ensure priv dir exists
        run: mkdir -p priv
      - uses: membraneframework/membrane_actions/actions/get-mix-deps@main
      - uses: membraneframework/membrane_actions/actions/use-build-cache@main
        with:
          env: test
      - run: mix deps.compile
      - run: mix test --exclude browser

  compare_versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare versions in mix.exs and python/pyproject.toml
        run: |
          python_ver=$(grep "^version =" python/pyproject.toml | awk '{print $3}' | tr -d ' "')
          elixir_ver=$(grep "^  @version" mix.exs | awk '{print $2}' | tr -d ' "')
          if [ "$python_ver" != "$elixir_ver" ]; then
            echo "package versions don't match - python: $python_ver, elixir: $elixir_ver"
            exit 1
          fi
